global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  receiver: 'telegram'
  routes:
    - match:
        severity: critical
      receiver: 'telegram'
    - match:
        severity: warning
      receiver: 'email'

receivers:
  - name: 'telegram'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: '${TELEGRAM_CHAT_ID}'
        message: |
          🚨 *STG Alert* 🚨
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Status:* {{ .Status }}
        parse_mode: 'Markdown'

  - name: 'email'
    email_configs:
      - to: 'ops-team@stg.org'
        from: 'alert@stg.org'
        smarthost: 'smtp.mailserver.com:587'
        auth_username: 'alert@stg.org'
        auth_password: '${SMTP_PASSWORD}'
        require_tls: true
        headers:
          subject: '[STG Alert] {{ .Annotations.summary }}'
          
