global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - "alerts/stg-alerts.yml"

scrape_configs:
  - job_name: 'stg-chain'
    static_configs:
      - targets: ['stg-chain:9100']
    metrics_path: /metrics

  - job_name: 'stg-web3'
    static_configs:
      - targets: ['stg-web3:9100']
    metrics_path: /metrics

  - job_name: 'bio-server'
    static_configs:
      - targets: ['bio-server:9100']
    metrics_path: /metrics

  - job_name: 'batik-digital'
    static_configs:
      - targets: ['batik-digital:9100']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
      
